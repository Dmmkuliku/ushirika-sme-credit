<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tanzania SME ecosystem banking portal for SMEs and lenders" />
    <title>Ushirika — Tanzania SME Banking Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div id="app" role="presentation"></div>
    <div id="toast-root" class="toast-root" aria-live="polite" aria-relevant="additions"></div>
    <div
      id="inactivity-overlay"
      class="inactivity-overlay"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="inactivity-title"
      aria-describedby="inactivity-desc"
    >
      <div class="inactivity-dialog">
        <h2 id="inactivity-title">Session expiring</h2>
        <p id="inactivity-desc">
          No activity detected. You will be signed out in
          <strong id="inactivity-countdown">15</strong> seconds.
        </p>
        <button type="button" id="inactivity-stay" class="btn btn-primary">
          Stay signed in
        </button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
