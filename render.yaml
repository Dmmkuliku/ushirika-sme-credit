# Render Blueprint — Backend API
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ushirika-api
    runtime: python
    plan: free
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: PSEUDONYMIZATION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ushirika-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: MODEL_DIR
        value: ./models
      - key: MIN_TRANSACTIONS_FOR_SCORE
        value: "5"
      - key: PYTHON_VERSION
        value: "3.13.0"

databases:
  - name: ushirika-db
    plan: free
    databaseName: ushirika
    user: ushirika
