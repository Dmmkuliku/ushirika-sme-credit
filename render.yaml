# Render Blueprint — Backend API
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ushirika-api
    runtime: python
    plan: free
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: PSEUDONYMIZATION_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./data/sme_credit.db
      - key: CORS_ORIGINS
        value: "https://ushirika-sme-portal.vercel.app,https://ushirika-sme-portal-dmmkuliku.vercel.app,http://localhost:5173,http://127.0.0.1:5173"
      - key: MODEL_DIR
        value: ./models
      - key: MIN_TRANSACTIONS_FOR_SCORE
        value: "5"
      - key: PYTHON_VERSION
        value: "3.12.8"
